name: Server CI and SSH deploy

on:
  push:
    branches:
      - main
    paths:
      - "server/**"
      - "shared/**"
      - ".github/workflows/server-ci-deploy.yml"
  pull_request:
    branches:
      - main
    paths:
      - "server/**"
      - "shared/**"
      - ".github/workflows/server-ci-deploy.yml"

concurrency:
  group: server-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install client dependencies for shared contracts
        run: npm ci --prefix ../client

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload server files to VPS
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_SSH_HOST }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          username: ${{ secrets.SERVER_SSH_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "server,shared,docker-compose.yml"
          target: ${{ secrets.SERVER_APP_PATH }}

      - name: Deploy via SSH
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_SSH_HOST }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          username: ${{ secrets.SERVER_SSH_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          command_timeout: 45m
          script: |
            set -euo pipefail

            APP_PATH="${{ secrets.SERVER_APP_PATH }}"
            export COMPOSE_PROJECT_NAME=slovo

            mkdir -p "$APP_PATH"
            cd "$APP_PATH"

            if command -v apt-get >/dev/null 2>&1; then
              if [ "$(id -u)" -eq 0 ]; then
                apt-get -o Acquire::ForceIPv4=true update
                apt-get install -y --no-install-recommends \
                  ca-certificates \
                  build-essential \
                  make \
                  g++ \
                  pkg-config \
                  python3 \
                  python3-pip \
                  python3-venv \
                  python3-setuptools \
                  python3-wheel
              else
                sudo apt-get -o Acquire::ForceIPv4=true update
                sudo apt-get install -y --no-install-recommends \
                  ca-certificates \
                  build-essential \
                  make \
                  g++ \
                  pkg-config \
                  python3 \
                  python3-pip \
                  python3-venv \
                  python3-setuptools \
                  python3-wheel
              fi
            fi

            docker compose up -d mysql

            MYSQL_CONTAINER="$(docker compose ps -q mysql)"
            if [ -z "$MYSQL_CONTAINER" ]; then
              echo "MySQL container was not found after docker compose up"
              docker compose ps
              exit 1
            fi

            echo "Waiting for MySQL to become ready..."
            until docker exec "$MYSQL_CONTAINER" mysqladmin ping -h127.0.0.1 -uroot -proot --silent; do
              sleep 2
            done

            docker exec -i "$MYSQL_CONTAINER" mysql -h127.0.0.1 -uroot -proot -e "CREATE DATABASE IF NOT EXISTS slovo CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
            docker exec -i "$MYSQL_CONTAINER" mysql -h127.0.0.1 -uroot -proot -e "SHOW DATABASES LIKE 'slovo';"

            cd server
            echo "Using DATABASE_URL from $APP_PATH/server/.env"
            test -f .env
            sed -n 's/^DATABASE_URL=.*/DATABASE_URL=[REDACTED]/p' .env

            pm2 stop slovo-server || true
            rm -rf node_modules

            export PYTHON=/usr/bin/python3

            if ! npm ci --foreground-scripts --loglevel verbose --no-audit --no-fund; then
              npm cache clean --force || true
              rm -rf node_modules
              npm ci --foreground-scripts --loglevel verbose --no-audit --no-fund --prefer-online
            fi

            npm run prisma:migrate:deploy
            npm run build

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            pm2 start dist/server/src/index.js --name slovo-server --update-env || pm2 restart slovo-server --update-env
            pm2 save

            curl -fsS http://127.0.0.1:4000/graphql >/dev/null