# Сервер: тесты → билд → (только push в main) SSH-деплой на VPS.
#
# Деплой выполняется в 2 шага:
# - копирует server/shared/docker-compose.yml с GitHub Actions на VPS (scp)
# - затем удаленно выполняет команды по SSH
# Важно: Deploy keys для VPS не нужны, потому что clone/pull на сервере не используется.
#
# Удаленный шаг:
# - поднимает MySQL через docker compose
# - запускает prisma migrate deploy
# - собирает server
# - перезапускает процесс через pm2
#
# Секреты репозитория (Settings → Secrets and variables → Actions):
#   SERVER_SSH_HOST      — IPv4/домен VPS
#   SERVER_SSH_PORT      — обычно 22
#   SERVER_SSH_USERNAME  — обычно root или deploy
#   SERVER_SSH_KEY       — приватный SSH-ключ (PEM/OpenSSH)
#   SERVER_APP_PATH      — путь к репозиторию на VPS, например /opt/slovo
#
name: Server CI and SSH deploy

on:
  push:
    branches:
      - main
    paths:
      - "server/**"
      - "shared/**"
      - ".github/workflows/server-ci-deploy.yml"
  pull_request:
    branches:
      - main
    paths:
      - "server/**"
      - "shared/**"
      - ".github/workflows/server-ci-deploy.yml"

concurrency:
  group: server-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  server:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install client dependencies for shared contracts
        run: npm ci --prefix ../client

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - name: Upload server files to VPS
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_SSH_HOST }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          username: ${{ secrets.SERVER_SSH_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "server,shared,docker-compose.yml"
          target: ${{ secrets.SERVER_APP_PATH }}

      - name: Deploy via SSH
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_SSH_HOST }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          username: ${{ secrets.SERVER_SSH_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          command_timeout: 45m
          script: |
            set -euo pipefail

            APP_PATH="${{ secrets.SERVER_APP_PATH }}"

            mkdir -p "$APP_PATH"
            cd "$APP_PATH"

            if command -v apt-get >/dev/null 2>&1; then
              if [ "$(id -u)" -eq 0 ]; then
                apt-get update
                apt-get install -y --no-install-recommends \
                  ca-certificates \
                  build-essential \
                  make \
                  g++ \
                  pkg-config \
                  python3 \
                  python3-pip \
                  python3-venv \
                  python3-setuptools \
                  python3-wheel
              else
                sudo apt-get update
                sudo apt-get install -y --no-install-recommends \
                  ca-certificates \
                  build-essential \
                  make \
                  g++ \
                  pkg-config \
                  python3 \
                  python3-pip \
                  python3-venv \
                  python3-setuptools \
                  python3-wheel
              fi
            fi

            docker compose up -d mysql

            cd server
            pm2 stop slovo-server || true
            rm -rf node_modules
            export PYTHON=/usr/bin/python3
            if ! npm ci --foreground-scripts --loglevel verbose --no-audit --no-fund; then
              npm cache clean --force || true
              rm -rf node_modules
              npm ci --foreground-scripts --loglevel verbose --no-audit --no-fund --prefer-online
            fi
            npm run prisma:migrate:deploy
            npm run build

            if ! command -v pm2 >/dev/null 2>&1; then
              npm install -g pm2
            fi

            pm2 start dist/server/src/index.js --name slovo-server --update-env || pm2 restart slovo-server --update-env
            pm2 save
