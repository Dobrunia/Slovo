<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="40" y1="32" x2="216" y2="224" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F9FF"/>
      <stop offset="1" stop-color="#E9EEFF"/>
    </linearGradient>

    <radialGradient id="aura" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(128 132) rotate(90) scale(86 86)">
      <stop stop-color="#DCCBFF"/>
      <stop offset="0.5" stop-color="#D9E7FF"/>
      <stop offset="1" stop-color="#D9E7FF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="headphonesL" x1="56" y1="88" x2="96" y2="136" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFB7DC"/>
      <stop offset="0.55" stop-color="#D7C8FF"/>
      <stop offset="1" stop-color="#A9D8FF"/>
    </linearGradient>

    <linearGradient id="headphonesR" x1="160" y1="88" x2="200" y2="136" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFB7DC"/>
      <stop offset="0.55" stop-color="#D7C8FF"/>
      <stop offset="1" stop-color="#A9D8FF"/>
    </linearGradient>

    <linearGradient id="penguinDark" x1="128" y1="64" x2="128" y2="198" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4B4A63"/>
      <stop offset="0.5" stop-color="#2F3148"/>
      <stop offset="1" stop-color="#222738"/>
    </linearGradient>

    <linearGradient id="belly" x1="108" y1="102" x2="155" y2="190" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F4F8FF"/>
    </linearGradient>

    <radialGradient id="eyeBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse"
      gradientTransform="translate(0 0) rotate(90) scale(22 18)">
      <stop stop-color="#7EE6FF"/>
      <stop offset="0.5" stop-color="#52A7FF"/>
      <stop offset="1" stop-color="#1E325A"/>
    </radialGradient>

    <linearGradient id="beak" x1="117" y1="136" x2="139" y2="156" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFD95C"/>
      <stop offset="1" stop-color="#FF9F1C"/>
    </linearGradient>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1 0 0 0 0.80
                0 1 0 0 0.84
                0 0 1 0 1
                0 0 0 0.28 0"/>
    </filter>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#9FADE0" flood-opacity="0.18"/>
    </filter>
  </defs>

  <!-- background -->
  <rect x="16" y="16" width="224" height="224" rx="56" fill="url(#bg)"/>

  <!-- soft aura -->
  <circle cx="128" cy="130" r="74" fill="url(#aura)" filter="url(#softGlow)"/>

  <!-- headphones band -->
  <path d="M80 102C80 74 102 58 128 58C154 58 176 74 176 102"
        stroke="#2C3046" stroke-width="12" stroke-linecap="round"/>

  <!-- left headphone -->
  <g filter="url(#shadow)">
    <rect x="56" y="92" width="34" height="48" rx="17" fill="url(#headphonesL)"/>
    <rect x="62" y="98" width="22" height="36" rx="11" fill="#2A3149"/>
    <rect x="66" y="102" width="14" height="28" rx="7" fill="#1E253A"/>
  </g>

  <!-- right headphone -->
  <g filter="url(#shadow)">
    <rect x="166" y="92" width="34" height="48" rx="17" fill="url(#headphonesR)"/>
    <rect x="172" y="98" width="22" height="36" rx="11" fill="#2A3149"/>
    <rect x="176" y="102" width="14" height="28" rx="7" fill="#1E253A"/>
  </g>

  <!-- penguin body -->
  <g filter="url(#shadow)">
    <path d="M128 198
             C170 198 198 172 198 132
             C198 95 170 68 128 68
             C86 68 58 95 58 132
             C58 172 86 198 128 198Z"
          fill="url(#penguinDark)"/>
  </g>

  <!-- side flippers -->
  <path d="M78 132C67 136 60 148 62 162C64 176 75 184 89 182C83 171 82 151 78 132Z"
        fill="#262C40"/>
  <path d="M178 132C189 136 196 148 194 162C192 176 181 184 167 182C173 171 174 151 178 132Z"
        fill="#262C40"/>

  <!-- white face -->
  <path d="M92 98
           C92 82 107 74 128 74
           C149 74 164 82 164 98
           C164 122 149 142 128 142
           C107 142 92 122 92 98Z"
        fill="#FCFEFF"/>

  <!-- belly -->
  <ellipse cx="128" cy="155" rx="38" ry="42" fill="url(#belly)"/>

  <!-- tiny hair highlight -->
  <path d="M111 78
           C117 71 125 68 134 69
           C140 69 146 71 151 76
           C143 74 137 76 132 81
           C125 78 118 77 111 78Z"
        fill="#FFFFFF" fill-opacity="0.95"/>

  <!-- eyes -->
  <g>
    <ellipse cx="107" cy="114" rx="15" ry="18" fill="#1E253A"/>
    <ellipse cx="149" cy="114" rx="15" ry="18" fill="#1E253A"/>

    <ellipse cx="107" cy="116" rx="11" ry="14" fill="url(#eyeBlue)"/>
    <ellipse cx="149" cy="116" rx="11" ry="14" fill="url(#eyeBlue)"/>

    <circle cx="111" cy="109" r="4.2" fill="white"/>
    <circle cx="153" cy="109" r="4.2" fill="white"/>

    <circle cx="105" cy="121" r="1.8" fill="#DFF8FF" fill-opacity="0.9"/>
    <circle cx="147" cy="121" r="1.8" fill="#DFF8FF" fill-opacity="0.9"/>
  </g>

  <!-- blush -->
  <ellipse cx="88" cy="134" rx="10" ry="6" fill="#FFC7DF" fill-opacity="0.65"/>
  <ellipse cx="168" cy="134" rx="10" ry="6" fill="#FFC7DF" fill-opacity="0.65"/>

  <!-- beak -->
  <path d="M116 133
           C116 125 122 120 128 120
           C134 120 140 125 140 133
           C140 141 134 149 128 149
           C122 149 116 141 116 133Z"
        fill="url(#beak)"/>

  <!-- beak split -->
  <path d="M128 121V148" stroke="#E38316" stroke-width="2.2" stroke-linecap="round" opacity="0.55"/>

  <!-- feet -->
  <ellipse cx="108" cy="196" rx="12" ry="7" fill="#FFBE46"/>
  <ellipse cx="148" cy="196" rx="12" ry="7" fill="#FFBE46"/>

  <!-- small base shadow -->
  <ellipse cx="128" cy="206" rx="42" ry="9" fill="#CDD8FF" fill-opacity="0.35"/>
</svg>