<svg width="256" height="256" viewBox="0 0 256 256" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="bg" x1="40" y1="32" x2="216" y2="224" gradientUnits="userSpaceOnUse">
        <stop stop-color="#F7F9FF"/>
        <stop offset="1" stop-color="#E9EEFF"/>
      </linearGradient>
  
      <linearGradient id="earL" x1="66" y1="82" x2="110" y2="150" gradientUnits="userSpaceOnUse">
        <stop stop-color="#F6C7FF"/>
        <stop offset="0.5" stop-color="#CFE1FF"/>
        <stop offset="1" stop-color="#AEEBFF"/>
      </linearGradient>
  
      <linearGradient id="earR" x1="146" y1="82" x2="190" y2="150" gradientUnits="userSpaceOnUse">
        <stop stop-color="#F6C7FF"/>
        <stop offset="0.5" stop-color="#CFE1FF"/>
        <stop offset="1" stop-color="#AEEBFF"/>
      </linearGradient>
  
      <linearGradient id="bodyGlow" x1="86" y1="92" x2="174" y2="196" gradientUnits="userSpaceOnUse">
        <stop stop-color="#FFFFFF"/>
        <stop offset="1" stop-color="#F5F8FF"/>
      </linearGradient>
  
      <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur stdDeviation="10" result="blur"/>
        <feColorMatrix in="blur" type="matrix"
          values="1 0 0 0 0.78
                  0 1 0 0 0.82
                  0 0 1 0 1
                  0 0 0 0.28 0"/>
      </filter>
    </defs>
  
    <!-- background -->
    <rect x="16" y="16" width="224" height="224" rx="56" fill="url(#bg)"/>
  
    <!-- soft aura -->
    <ellipse cx="128" cy="132" rx="78" ry="70" fill="#D8DFFF" filter="url(#softGlow)"/>
  
    <!-- left ear -->
    <path d="M92 138
             C72 130 58 112 58 90
             C58 70 70 56 86 56
             C104 56 116 70 116 88
             C116 98 112 107 104 114
             C97 120 92 127 92 138Z"
          fill="url(#earL)"/>
  
    <path d="M96 131
             C82 125 72 111 72 94
             C72 80 80 70 91 70
             C103 70 110 80 110 92
             C110 100 107 106 101 111
             C97 115 95 121 96 131Z"
          fill="#FDFEFF" fill-opacity="0.75"/>
  
    <!-- right ear -->
    <path d="M164 138
             C184 130 198 112 198 90
             C198 70 186 56 170 56
             C152 56 140 70 140 88
             C140 98 144 107 152 114
             C159 120 164 127 164 138Z"
          fill="url(#earR)"/>
  
    <path d="M160 131
             C174 125 184 111 184 94
             C184 80 176 70 165 70
             C153 70 146 80 146 92
             C146 100 149 106 155 111
             C159 115 161 121 160 131Z"
          fill="#FDFEFF" fill-opacity="0.75"/>
  
    <!-- body -->
    <path d="M128 198
             C168 198 198 172 198 136
             C198 102 170 78 128 78
             C86 78 58 102 58 136
             C58 172 88 198 128 198Z"
          fill="url(#bodyGlow)"/>
  
    <!-- tiny fluff -->
    <path d="M110 82
             C114 74 122 68 132 68
             C138 68 144 70 149 75
             C140 74 134 78 130 84
             C124 80 118 79 110 82Z"
          fill="#FFFFFF"/>
  
    <!-- eyes -->
    <ellipse cx="102" cy="132" rx="15" ry="18" fill="#2C2F55"/>
    <ellipse cx="154" cy="132" rx="15" ry="18" fill="#2C2F55"/>
  
    <!-- eye highlights -->
    <circle cx="107" cy="126" r="4.5" fill="white"/>
    <circle cx="159" cy="126" r="4.5" fill="white"/>
  
    <!-- blush -->
    <ellipse cx="82" cy="148" rx="10" ry="6" fill="#FFD6F1" fill-opacity="0.65"/>
    <ellipse cx="174" cy="148" rx="10" ry="6" fill="#FFD6F1" fill-opacity="0.65"/>
  
    <!-- mouth -->
    <path d="M116 154
             C120 162 136 162 140 154"
          stroke="#D96FA7" stroke-width="5" stroke-linecap="round"/>
  
    <!-- little tail/wisp -->
    <path d="M176 176
             C193 175 204 185 204 198
             C204 212 192 220 176 216
             C188 212 192 204 189 197
             C186 190 182 184 176 176Z"
          fill="#C8EEFF" fill-opacity="0.9"/>
  </svg>