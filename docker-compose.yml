services:
  mysql:
    image: mysql:8.4
    container_name: slovo-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: slovo
      MYSQL_USER: slovo
      MYSQL_PASSWORD: slovo
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - slovo-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -proot || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  slovo-mysql-data:
